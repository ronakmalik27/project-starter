# merge-gate: runs on merge to the default branch. Re-verifies main and, when
# your project ships a container, builds and pushes an image tagged by the
# merge commit SHA. The deploy step lives in cd-release-gate.yml and consumes
# a chosen image digest from here.
name: merge-gate

on:
  push:
    branches: [main]

concurrency:
  group: merge-gate-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify:
    name: Verify main
    if: vars.CI_PAUSED != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Build and test
        run: |
          make ci-build
          make ci-test

