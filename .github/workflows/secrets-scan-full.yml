# secrets-scan-full: a full-history secrets sweep. pr-gate scans each PR's
# commit range; this re-scans the ENTIRE history against the current gitleaks
# ruleset on a schedule and on demand, so a secret committed long ago (or one
# the per-PR scan missed) is still caught. The engine is version + sha256
# pinned to match pr-gate exactly.
name: secrets-scan-full

on:
  schedule:
    # Mondays 04:17 UTC: off-peak, and the minute offset dodges the
    # top-of-hour scheduling surge (a delayed cron can be dropped).
    - cron: '17 4 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: secrets-scan-full
  cancel-in-progress: false

jobs:
  full-scan:
    name: Full-history secrets scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0 # full history is the whole point of this sweep
          persist-credentials: false
      - name: Install gitleaks 8.30.1 (checksum-verified)
        run: |
          set -euo pipefail
          curl -sSLo gl.tgz https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz
          echo "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb  gl.tgz" | sha256sum -c -
          tar -xzf gl.tgz gitleaks && rm gl.tgz
      - name: Scan full history
        run: ./gitleaks detect --source . --redact
